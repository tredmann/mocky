openapi: "3.0.3"
info:
  title: Petstore API
  description: A sample API that uses a petstore as an example
  version: "1.0.0"
  contact:
    name: API Support
    email: support@example.com
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
              example:
                - id: 1
                  name: "Buddy"
                  tag: "dog"
                - id: 2
                  name: "Whiskers"
                  tag: "cat"
        "500":
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              example:
                id: 3
                name: "Rex"
                tag: "dog"
        "422":
          description: Validation error
          content:
            application/json:
              example:
                code: 422
                message: "Validation failed"
  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Info for a specific pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              example:
                id: 1
                name: "Buddy"
                tag: "dog"
        "404":
          description: Pet not found
          content:
            application/json:
              example:
                code: 404
                message: "Pet not found"
    delete:
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Pet deleted
  /pets/{petId}/vaccinations:
    get:
      summary: List vaccinations for a pet
      responses:
        "200":
          description: Vaccination records
          content:
            application/json:
              example:
                - vaccine: "Rabies"
                  date: "2024-01-15"
                - vaccine: "Distemper"
                  date: "2024-03-20"
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        tag:
          type: string
    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
