openapi: "3.0.3"
info:
  title: Schema Example API
  version: "1.0.0"
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    email:
                      type: string
                      format: email
                    name:
                      type: string
                    active:
                      type: boolean
    post:
      operationId: createUser
      summary: Create a user
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string
                    format: email
                  name:
                    type: string
                  role:
                    type: string
                    enum:
                      - admin
                      - user
                      - moderator
