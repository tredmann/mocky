services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    volumes:
      - sqlite:/app/database
      - storage:/app/storage
    environment:
      APP_NAME: Mocky
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: "mocky"
      REVERB_APP_KEY: "mocky-reverb-key"
      REVERB_APP_SECRET: "mocky-reverb-secret"
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: "8080"
      REVERB_SCHEME: "http"

volumes:
  sqlite:
  storage:
